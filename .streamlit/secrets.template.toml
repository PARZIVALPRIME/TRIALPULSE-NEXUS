# =============================================================================
# TRIALPULSE NEXUS 10X - Streamlit Cloud Secrets Template
# =============================================================================
# Copy this file to .streamlit/secrets.toml and fill in your values
# DO NOT commit secrets.toml to git!
# =============================================================================

# LLM Configuration
# Primary provider: "ollama" (local) or "groq" (cloud)
# For Streamlit Cloud, use "groq" since Ollama won't be available
LLM_PRIMARY_PROVIDER = "groq"

# Groq API Key (get from https://console.groq.com/)
GROQ_API_KEY = "your-groq-api-key-here"

# Optional: Groq model (defaults to llama-3.3-70b-versatile)
# GROQ_MODEL = "llama-3.3-70b-versatile"
